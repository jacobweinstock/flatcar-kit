name: Release
on:
  push:
    tags:
      - "v**"

env:
  REGISTRY: ghcr.io
  GO_VERSION: "1.26"

jobs:
  goreleaser:
    # Build and publish the multi-arch image, binaries, checksums, changelog and
    # GitHub Release on tag pushes. GoReleaser owns all publishing.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
