name: Release
on:
  push:
    tags:
      - "v**"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  GO_VERSION: "1.26"

jobs:
  release:
    # Build and publish the multi-arch image to ghcr.io on tag pushes. Binaries are
    # compiled from the tagged source so the tag is available to the build.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        run: make release
        env:
          IMAGE: ${{ env.IMAGE }}
